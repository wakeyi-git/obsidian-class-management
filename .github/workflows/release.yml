name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Verify tag
        run: node -e "const m=require('./manifest.json'); if(!/^\d+\.\d+\.\d+$/.test(process.env.GITHUB_REF_NAME)||m.version!==process.env.GITHUB_REF_NAME) throw new Error('Tag must be x.y.z and exactly match manifest version')"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" manifest.json main.js styles.css --generate-notes --verify-tag
